name: Update README

on:
  schedule:
    # Runs at 18:00 UTC every day (12:00 AM Bangladesh Time)
    - cron: "0 18 * * *"
  # Allows you to trigger the workflow manually from the Actions tab
  workflow_dispatch:

# Cancel any in-progress runs of this workflow to prevent duplicates
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# By default, drop all global permissions for security
permissions: {}

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      # Scoped strictly to this job. Required by git-auto-commit-action to push changes to 'main'.
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          


      - name: Update WakaTime Stats
        # Stable action for injecting coding time metrics into the README
        uses: athul/waka-readme@370590ad8da8f54282ed92aa42b7c25ecbd5a9a6
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          SHOW_TITLE: true
          SECTION_NAME: waka
          BLOCKS: ->
          TIME_RANGE: last_7_days
          SHOW_TIME: true
          SHOW_TOTAL: true
        # continue-on-error prevents workflow failure if the user hasn't added the WAKATIME secret yet
        continue-on-error: true

      - name: Update Recent Activity
        uses: jamesgeorge007/github-activity-readme@4aefbfa1c222d70537dc6a02f0519266aab2b1ea
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          COMMIT_MSG: 'Update recent activity'
          MAX_LINES: 5
        continue-on-error: true

      - name: Fetch Competitive Programming Stats
        # Runs the custom Python script. Placed here so its local changes are not overwritten by the above actions.
        continue-on-error: true
        env:
          CF_HANDLE: nazrulislam_7
          AC_HANDLE: nazrulislam_7
          CC_HANDLE: nazrulislam_7
        run: |
          if [ -f "scripts/update_cp_stats.py" ]; then
            python scripts/update_cp_stats.py
          else
            echo "Python script not found, skipping..."
          fi

      - name: Auto-Commit Changes
        # Reliable action to detect if any files were changed (by scripts or WakaTime) and commit them automatically
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: automatically update README stats"
          branch: main
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
